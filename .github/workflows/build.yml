name: Build Next.js Apps

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-admin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./admin.meddynet
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './admin.meddynet/package-lock.json'
      - run: npm ci
      - run: npm run build

  build-patient:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./MeddyNet
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './MeddyNet/package-lock.json'
      - run: npm ci
      - run: npm run build

  build-technician:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./technician-app
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './technician-app/package-lock.json'
      - run: npm ci
      - run: npm run build

  build-lab-portal:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./meddynet-lab-portal
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './meddynet-lab-portal/package-lock.json'
      - run: npm ci
      - run: npm run build
