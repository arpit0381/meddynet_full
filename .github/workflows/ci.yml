name: MeddyNet CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meddynet-backend
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 black isort
      
      - name: Check formatting with Black
        run: black --check app/ tests/ --line-length 120
      
      - name: Check import ordering
        run: isort --check-only app/ tests/
      
      - name: Lint with Flake8
        run: flake8 app/ --max-line-length 120 --ignore E501,W503,E402

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: meddynet-backend
    env:
      ENVIRONMENT: testing
      DATABASE_URL: sqlite+aiosqlite:///./test.db
      JWT_SECRET_KEY: test-secret-key-for-ci
      SECRET_KEY: test-secret-ci
      REDIS_URL: ""
      MONGODB_URL: ""
      SUPABASE_URL: https://test.supabase.co
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_KEY: test-service-key
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx
      
      - name: Run tests
        run: pytest tests/ -v --tb=short

  frontend-patient:
    name: Patient Portal Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: MeddyNet
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: MeddyNet/package-lock.json
      
      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.meddynet.com

  frontend-admin:
    name: Admin Portal Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin.meddynet
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin.meddynet/package-lock.json
      
      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.meddynet.com

  frontend-lab:
    name: Lab Portal Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: meddynet-lab-portal
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: meddynet-lab-portal/package-lock.json
      
      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.meddynet.com

  frontend-technician:
    name: Technician App Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: technician-app
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: technician-app/package-lock.json
      
      - name: Install & Build
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.meddynet.com
